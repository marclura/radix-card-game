<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radix - Card Game</title>
    <script src="src/js/main.js" type="module" defer></script>
    <link rel="stylesheet" href="src/css/main.css">
</head>
<body>

    <!-- welcome -->

    <div id="scene-welcome" class="scene"">
        <div class="controller controller-p1">
            <button id="btn-start-p1">Start</button>
        </div>

        <div class="game-screen">
            <h1>Welcome to the Card Game</h1>
            <p>Click "Start" when redy to play!</p>
        </div>

        <div class="controller controller-p2">
            <button id="btn-start-p2">Start</button>
        </div>
    </div>

    <!-- character select -->

    <div id="scene-character-select" class="scene">
        <div class="controller controller-p1" id="character-selector-controller-p1">
            <button id="btn-select-previous-p1" class="btn-select-previous"><</button>
            <button id="btn-select-next-p1" class="btn-select-next">></button>
            <button id="btn-select-p1" class="btn-select-select">Select</button>
        </div>
        <div class="game-screen">

            <!-- P1 selection -->
            <div id="selection-p1">
                <h2>Player 1</h2>
                <ul id="display-selection-p1"></ul>
            </div>
            
            <!-- thumbnails list -->
            <div id="selection-characters-thumbnail">
                <h1>Select</h1>
                <ul id="list-characters">
                </ul>
            </div>

            <!-- P2 selection -->
            <div id="selection-p2">
                <h2>Player 2</h2>
                <ul id="display-selection-p2"></ul>
            </div>
        </div>
        <div class="controller controller-p2" id="character-selector-controller-p2">
            <button id="btn-select-previous-p2" class="btn-select-previous"><</button>
            <button id="btn-select-next-p2" class="btn-select-next">></button>
            <button id="btn-select-p2" class="btn-select-select">Select</button>
        </div>
    </div>

    <!-- tutorial -->

    <div id="scene-tutorial" class="scene"">
        <div class="controller controller-p1">
            <button id="btn-play-p1">Play</button>
        </div>

        <div class="game-screen">
            <h1>Tutorial</h1>
        </div>

        <div class="controller controller-p2">
            <button id="btn-play-p2">Play</button>
        </div>
    </div>

    <!-- game play -->

    <div id="scene-game-play" class="scene"">
        <div class="controller controller-p1">
            <button id="btn-choose-p1">Choose</button>
        </div>

        <div class="game-screen">
            <h1>Game Play</h1>
        </div>

        <div class="controller controller-p2">
            <button id="btn-choose-p2">Choose</button>
        </div>
    </div>

    <!-- winner -->

    <div id="scene-winner" class="scene"">
        <div class="controller controller-p1">
            <button id="btn-restart-p1">Restart</button>
        </div>

        <div class="game-screen">
            <h1>The Winner</h1>
        </div>

        <div class="controller controller-p2">
            <button id="btn-restart-p2">Restart</button>
        </div>
    </div>
    
</body>
</html>
