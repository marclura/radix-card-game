<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radix - Card Game</title>
    <script src="src/js/main.js" type="module" defer></script>
    <link rel="stylesheet" href="src/css/main.css">
</head>
<body>

    <div id="scene-welcome" class="scene"">
        <div class="controller controller-p1">
            <button id="btn-start-p1">Start</button>
        </div>

        <div class="game-screen">
            <h1>Welcome to the Card Game</h1>
            <p>Click "Start" when redy to play!</p>
        </div>

        <div class="controller controller-p2">
            <button id="btn-start-p2">Start</button>
        </div>
    </div>

    <div id="scene-character-select" class="scene">
        <div class="controller controller-p1"></div>
        <div class="game-screen"></div>
        <div class="controller controller-p2"></div>
    </div>
    
</body>
</html>
