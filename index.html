<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radix - Card Game</title>
    <script src="src/js/main.js" type="module" defer></script>
    <link rel="stylesheet" href="src/css/main.css">
</head>
<body>

    <!-- welcome -->

    <div id="scene-welcome" class="scene"">
        
        <div class="game-screen">
            <header>
                <p class="h1">Benvenuto al gioco delle carte</p>
            </header>
            <section>
                <p>Premi il bottone per iniziare</p>
            </section>
        </div>

        <div class="controller-container">
            <div class="controller controller-p1">
                <button class="btn-select btn-select-p1">Inizia</button>
            </div>

            <div class="controller controller-p2">
                <button class="btn-select btn-select-p2">Inizia</button>
            </div>
        </div>
    </div>

    <!-- character select -->

    <div id="scene-character-select" class="scene">
    
        <div class="game-screen">

            <header>
                <p class="h2">Scegli la tua squadra vincente!</p>
            </header>

            <section>
                <!-- P1 selection -->
                <div id="selection-p1">
                    <div id="display-selection-p1"></div>
                </div>

                <!-- thumbnails list -->
                <div id="selection-thumb-container">
                    <ul id="list-thumbnails"></ul>
                </div>            

                <!-- P2 selection -->
                <div id="selection-p2">
                    <div id="display-selection-p2" class="character-card-right"></div>
                </div>
            </div>
        </section>

        <div class="controller-container">
            <div class="controller controller-p1" id="character-selector-controller-p1">
                <button class="btn-AB btn-A-p1">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 161.54 235.24" class="btn-icon btn-arrow-up">
                        <polyline points="154.47 147.4 80.77 221.1 7.07 147.4 80.77 221.1"/>
                        <line x1="80.77" y1="221.1" x2="80.77"/>
                    </svg>
                </button>
                <button class="btn-AB btn-B-p1">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 161.54 235.24" class="btn-icon btn-arrow-down">
                        <polyline points="154.47 147.4 80.77 221.1 7.07 147.4 80.77 221.1"/>
                        <line x1="80.77" y1="221.1" x2="80.77"/>
                    </svg>
                </button>
                <button class="btn-select-p1">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 158.22 177.83" class="btn-icon btn-select">
                        <polyline points="8.48 69.74 63.82 158.19 149.49 4.88"/>
                    </svg>
                </button>
            </div>

            <div class="controller controller-p2" id="character-selector-controller-p2">
                <button class="btn-AB btn-A-p2">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 161.54 235.24" class="btn-icon btn-arrow-up">
                        <polyline points="154.47 147.4 80.77 221.1 7.07 147.4 80.77 221.1"/>
                        <line x1="80.77" y1="221.1" x2="80.77"/>
                    </svg>
                </button>
                <button class="btn-AB btn-B-p2">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 161.54 235.24" class="btn-icon btn-arrow-down">
                        <polyline points="154.47 147.4 80.77 221.1 7.07 147.4 80.77 221.1"/>
                        <line x1="80.77" y1="221.1" x2="80.77"/>
                    </svg>
                </button>
                <button class="btn-select-p2">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 158.22 177.83" class="btn-icon btn-select">
                        <polyline points="8.48 69.74 63.82 158.19 149.49 4.88"/>
                    </svg>
                </button>
            </div>
        </div>

    </div>

    <!-- bet -->

    <div id="scene-bet" class="scene"">

        <div class="game-screen">
            <header>
                <p class="h2">Fate la vostra puntata! Potete puntare da 2 a 12 fiches. I vincitori riceveranno il doppio della puntata.</p>
            </header>
            <section>
                <div id="bet-container">
                    <div id="bet-p1" class="bet-player"></div>
                    <div id="bet-p2" class="bet-player"></div>
                </div>
            </section>
        </div>

        <div class="controller-container">
            <div class="controller controller-p1">
                <button class="btn-AB btn-A-p1">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 161.54 235.24" class="btn-icon btn-arrow-down">
                        <polyline points="154.47 147.4 80.77 221.1 7.07 147.4 80.77 221.1"/>
                        <line x1="80.77" y1="221.1" x2="80.77"/>
                    </svg>
                </button>
                <button class="btn-AB btn-B-p1">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 161.54 235.24" class="btn-icon btn-arrow-up">
                        <polyline points="154.47 147.4 80.77 221.1 7.07 147.4 80.77 221.1"/>
                        <line x1="80.77" y1="221.1" x2="80.77"/>
                    </svg>
                </button>
                <button class="btn-select btn-select-p1">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 158.22 177.83" class="btn-icon btn-select">
                        <polyline points="8.48 69.74 63.82 158.19 149.49 4.88"/>
                    </svg>
                </button>
            </div>

            <div class="controller controller-p2">
                <button class="btn-AB btn-A-p2">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 161.54 235.24" class="btn-icon btn-arrow-down">
                        <polyline points="154.47 147.4 80.77 221.1 7.07 147.4 80.77 221.1"/>
                        <line x1="80.77" y1="221.1" x2="80.77"/>
                    </svg>
                </button>
                <button class="btn-AB btn-B-p2">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 161.54 235.24" class="btn-icon btn-arrow-up">
                        <polyline points="154.47 147.4 80.77 221.1 7.07 147.4 80.77 221.1"/>
                        <line x1="80.77" y1="221.1" x2="80.77"/>
                    </svg>
                </button>
                <button class="btn-select btn-select-p2">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 158.22 177.83" class="btn-icon btn-select">
                        <polyline points="8.48 69.74 63.82 158.19 149.49 4.88"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- game play -->

    <div id="scene-game-play" class="scene"">

        <!-- game screen -->
        <div class="game-screen">
            <div id="game-timer-container">
                <header>
                    <div id="game-timer-bar-container">
                        <div id="game-time-bar" width="100%"></div>
                    </div>
                </header>
                <section>
                    <div id="game-play-contianer">
                        <div id="score-board-p1" class="score-board">
                            <div id="game-character-p1"></div>
                            <div id="points-p1" class="points"></div>
                        </div>
                        <div id="card-withdraw-container">
                            <div id="card-message"></div>
                            <div id="card-reveal" class="card">
                                <div id="card-points"></div>
                            </div>
                        </div>
                        <div id="score-board-p2" class="score-board">
                            <div id="points-p2" class="points"></div>
                            <div id="game-character-p2" class="character-card-right"></div>
                        </div>
                    </div>
                </section>
            </div>
        </div>

        <div class="controller-container"> 
            <!-- card deck p1 -->
            <div class="controller controller-p1">
                <div id="card-decks-p1" class="card-decks-container">
                    <button id="card-deck-1-p1" class="card card-deck card-deck-1"></button>
                    <button id="card-deck-2-p1" class="card card-deck card-deck-2"></button>
                    <button id="card-deck-3-p1" class="card card-deck card-deck-3"></button>
                </div>
            </div>

            <!-- card deck p1 -->
            <div class="controller controller-p2">
                <div id="card-decks-p2" class="card-decks-container">
                    <button id="card-deck-1-p2" class="card card-deck card-deck-1"></button>
                    <button id="card-deck-2-p2" class="card card-deck card-deck-2"></button>
                    <button id="card-deck-3-p2" class="card card-deck card-deck-3"></button>
                </div>
            </div>
        </div>
    </div>

    <!-- winner -->

    <div id="scene-winner" class="scene"">

        <div class="game-screen">
            <header>
                <p class="h1">Winner</p>
            </header>
            <section>
                <div id="winner-message"></div>
                <div id="score-board-p1" class="score-board">
                    <div id="game-character-p1"></div>
                    <div id="points-p1" class="points"></div>
                </div>
            </section>
        </div>

        <div class="controller-container">
            <div class="controller controller-p1">
                <button class="btn-select btn-select-p1">Ricomincia</button>
            </div>

            <div class="controller controller-p2">
                <button class="btn-select btn-select-p2">Ricomincia</button>
            </div>
        </div>
    </div>
    
</body>
</html>
